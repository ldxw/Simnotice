name: Build and Push Docker images to GHCR

on:
  # push:
  #   branches:
  #     - dev
  workflow_dispatch:
    inputs:
      build_branch:
        description: "选择要构建的分支"
        required: true
        default: "dev"
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            file: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/simnotice-backend
          - name: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/simnotice-frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.build_branch || github.ref_name }}

      - name: Debug files
        run: |
          echo "event: ${{ github.event_name }}"
          echo "ref_name: ${{ github.ref_name }}"
          echo "input branch: ${{ inputs.build_branch }}"
          pwd
          ls -la
          ls -la backend || true
          ls -la frontend || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate date tag
        id: date
        run: |
          echo "date_tag=$(TZ=Asia/Shanghai date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ steps.date.outputs.date_tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
